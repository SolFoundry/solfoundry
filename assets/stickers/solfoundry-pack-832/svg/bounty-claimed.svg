<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SolFoundry Bounty Claimed sticker</title>
  <desc id="desc">Reward claim sticker with FNDRY coin stack styling.</desc>
  <defs>
    <linearGradient id="sol" x1="96" y1="80" x2="416" y2="432" gradientUnits="userSpaceOnUse">
