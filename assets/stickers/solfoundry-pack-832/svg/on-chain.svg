<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SolFoundry On Chain sticker</title>
  <desc id="desc">Blockchain-themed SolFoundry sticker with linked blocks.</desc>
  <defs>
    <linearGradient id="sol" x1="96" y1="80" x2="416" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="forge" x1="142" y1="88" x2="358" y2="430" gradientUnits="userSpaceOnUse">
