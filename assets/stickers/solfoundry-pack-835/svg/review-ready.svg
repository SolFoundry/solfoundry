<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SolFoundry Review Ready sticker</title>
  <desc id="desc">Magnifier and checklist sticker for ready-to-review work.</desc>
  <defs>
    <linearGradient id="sol" x1="97" y1="82" x2="411" y2="423" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="hot" x1="152" y1="78" x2="347" y2="431" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="0.5" stop-color="#FF4D6D"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="cool" x1="112" y1="78" x2="398" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EE1FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
      <rect x="67" y="62" width="378" height="388" rx="91" fill="#101628" stroke="#FFFFFF" stroke-width="20"/>
            <rect x="91" y="86" width="330" height="340" rx="68" fill="none" stroke="#5EE1FF" stroke-width="8"/>      <g transform="translate(240 222) rotate(-12)">
            <rect x="-86" y="-72" width="172" height="144" rx="28" fill="#121421" stroke="#FFFFFF" stroke-width="9"/>
            <rect x="-52" y="-33" width="100" height="13" rx="7" fill="#14F195"/>
            <rect x="-52" y="1" width="132" height="12" rx="6" fill="#FFFFFF" opacity=".24"/>
            <rect x="-52" y="34" width="74" height="12" rx="6" fill="#5EE1FF"/>
            <circle cx="88" cy="75" r="44" fill="none" stroke="#5EE1FF" stroke-width="14"/>
            <path d="M119 106 169 156" stroke="#5EE1FF" stroke-width="16" stroke-linecap="round"/>
          </g>      <g transform="translate(317 248) scale(0.76)">
            <circle cx="0" cy="0" r="54" fill="#14F195" stroke="#FFFFFF" stroke-width="10"/>
            <path d="M-29 1-7 23 34-29" stroke="#090A10" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
          </g>      <text x="256" y="407" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="46" font-weight="900" letter-spacing="0" fill="#FFFFFF" stroke="#090A10" stroke-width="9" paint-order="stroke">REVIEW</text>
  </g>
</svg>
