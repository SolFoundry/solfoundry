name: 🟢 Tier 1 Bounty
description: Submit a Tier 1 Bounty (Open Race)
title: "🏭 Bounty T1: [Task Name]"
labels: ["bounty", "tier-1"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🟢 Tier 1 Bounty — Open Race
        **Reward:** 200,000 $FNDRY
        **Deadline:** 72h | **Min review score:** 6/10
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a detailed description of the task (e.g., Full tokenomics page showing $FNDRY distribution, buyback mechanics, treasury).
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What are the criteria for a valid submission?
    validations:
      required: true
  - type: input
    id: submission_link
    attributes:
      label: Submission Link
      description: Link to your PR or work.
    validations:
      required: false
