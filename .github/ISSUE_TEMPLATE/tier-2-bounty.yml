name: "🟡 Tier 2 Bounty (500-5000 $FNDRY)"
description: "Open race bounty — requires Tier 2 access (4+ merged T1 bounties)"
title: "🏭 Bounty T2: "
labels: ["bounty", "tier-2"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tier 2 — Open Race (Gated Access)
        - **Reward:** 500-5,000 $FNDRY
        - **Mode:** Open race — first quality PR wins. Must have 4+ merged T1 bounty PRs to submit.
        - **Deadline:** 7 days from issue creation
        - **Rules:** Must pass AI code review (score ≥ 6/10). Include tests and docs.
        - **Access:** Claim-guard checks your merged T1 count automatically. Star rewards and content bounties do NOT count.
  - type: textarea
    id: description
    attributes:
      label: Bounty Description
      description: What needs to be built
      placeholder: Describe the feature or fix in detail...
    validations:
      required: true
  - type: input
    id: reward
    attributes:
      label: Reward Amount ($FNDRY)
      description: "How many $FNDRY tokens for this bounty"
      placeholder: "1000"
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements & Acceptance Criteria
      description: "Detailed requirements — PR must satisfy ALL"
      placeholder: |
        - [ ] Requirement 1
        - [ ] Requirement 2
        - [ ] Tests with >80% coverage
        - [ ] Documentation
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Frontend
        - Backend
        - Smart Contract
        - AI/ML
        - Scraping
        - Bot
        - DevOps
        - Security
        - Design
        - Full Stack
        - Docs
    validations:
      required: true
  - type: textarea
    id: technical_details
    attributes:
      label: Technical Details
      description: "Architecture notes, API specs, DB schemas, etc."
      placeholder: "Technical implementation guidance..."
    validations:
      required: false
  - type: textarea
    id: resources
    attributes:
      label: Resources & References
      description: "Links, docs, Figma, or examples"
    validations:
      required: false
