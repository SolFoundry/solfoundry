name: "🔴 Tier 3 Bounty (5000-50000 $FNDRY)"
description: "Claim-based bounty — requires Tier 3 access (3+ merged T2 bounties)"
title: "🏭 Bounty T3: "
labels: ["bounty", "tier-3"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tier 3 — Claim-Based (Gated Access)
        - **Reward:** 5,000-50,000 $FNDRY
        - **Mode:** Claim-based — comment "claiming" to reserve. Must have 3+ merged T2 bounty PRs to claim.
        - **Deadline:** 14 days from claim. Progress check at day 7.
        - **Rules:** Must pass AI code review (score ≥ 6/10). Full test suite + docs required. May require multiple PRs.
        - **Access:** Claim-guard checks your merged T2 count automatically. Star rewards and content bounties do NOT count.
  - type: textarea
    id: description
    attributes:
      label: Bounty Description
      description: What major feature or system needs to be built
      placeholder: Describe the project scope...
    validations:
      required: true
  - type: input
    id: reward
    attributes:
      label: Reward Amount ($FNDRY)
      description: "How many $FNDRY tokens for this bounty"
      placeholder: "10000"
    validations:
      required: true
  - type: textarea
    id: milestones
    attributes:
      label: Milestones
      description: "Break the project into milestones with partial payouts"
      placeholder: |
        1. Milestone 1 (30%): Database schema + API endpoints
        2. Milestone 2 (30%): Frontend UI + integration
        3. Milestone 3 (40%): Testing, docs, deployment
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements & Acceptance Criteria
      description: "Complete acceptance criteria"
      placeholder: |
        - [ ] Full feature implementation
        - [ ] Test coverage >90%
        - [ ] API documentation
        - [ ] Performance benchmarks
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Frontend
        - Backend
        - Smart Contract
        - AI/ML
        - Scraping
        - Bot
        - DevOps
        - Security
        - Design
        - Full Stack
        - Infrastructure
        - Docs
    validations:
      required: true
  - type: textarea
    id: technical_details
    attributes:
      label: Technical Architecture
      description: "Architecture diagrams, API contracts, data models"
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Resources & References
    validations:
      required: false
