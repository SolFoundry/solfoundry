name: "ci: JSON Validation"
on:
  pull_request:
    paths:
      - 'submissions/**.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          for file in submissions/*.json; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python3 -c "import json; json.load(open('$file'))" || exit 1
            fi
          done
