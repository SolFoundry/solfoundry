name: Wallet Check

on:
  issue_comment:
    types: [created]

jobs:
  verify_wallet:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.number == 48 }}
    steps:
      - name: Check for Solana Wallet Address
        uses: actions/github-script@v6
        with:
          script: |
            const commentBody = context.payload.comment.body;
            const solanaWalletRegex = /\b[1-9A-HJ-NP-Za-km-z]{32,44}\b/;
            
            if (solanaWalletRegex.test(commentBody)) {
              console.log('Valid Solana wallet address found.');
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket'
              });
            } else {
              console.log('No valid Solana wallet address found in the comment.');
            }
