# Deploy Pipeline - Builds Docker images on merge to main.
# Staging auto-deploys. Production requires manual approval gate.
# Rollback: use workflow_dispatch with rollback_tag set to a previous SHA.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - production
          - staging
      rollback_tag:
        description: 'Image tag to rollback to (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # ==================== BUILD BACKEND DOCKER IMAGE ====================
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    if: inputs.rollback_tag == ''
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD FRONTEND DOCKER IMAGE ====================
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    if: inputs.rollback_tag == ''
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY TO STAGING (auto) ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || inputs.rollback_tag != '')
    environment:
      name: staging
      url: https://staging.solfoundry.org
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            echo "tag=${{ inputs.rollback_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/solfoundry-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace staging
          kubectl set image deployment/solfoundry-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace staging
          kubectl rollout status deployment/solfoundry-backend --namespace staging --timeout=300s
          kubectl rollout status deployment/solfoundry-frontend --namespace staging --timeout=300s

      - name: Verify Staging Health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://staging-api.solfoundry.org/health | grep -q ok; then
              echo "Staging healthy"; exit 0
            fi; sleep 10
          done
          echo "Health check failed"; exit 1

  # ==================== DEPLOY TO PRODUCTION (manual approval) ============
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-backend, build-frontend]
    if: always() && needs.deploy-staging.result == 'success'
    environment:
      name: production
      url: https://solfoundry.org
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            echo "tag=${{ inputs.rollback_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to Production
        run: |
          kubectl set image deployment/solfoundry-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace production
          kubectl set image deployment/solfoundry-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace production
          kubectl rollout status deployment/solfoundry-backend --namespace production --timeout=300s
          kubectl rollout status deployment/solfoundry-frontend --namespace production --timeout=300s

      - name: Verify Production Health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.solfoundry.org/health | grep -q ok; then
              echo "Production healthy"; exit 0
            fi; sleep 10
          done
          echo "Health check failed"; exit 1

  # ==================== DATABASE MIGRATIONS ====================
  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install alembic

      - name: Run Migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

  # ==================== DEPLOYMENT SUMMARY ====================
  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, deploy-staging, deploy-production, migrate-database]
    if: always()
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Deploy | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Deploy | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration | ${{ needs.migrate-database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback" >> $GITHUB_STEP_SUMMARY
          echo "Trigger workflow_dispatch with rollback_tag to deploy a previous image." >> $GITHUB_STEP_SUMMARY