# Deploy Pipeline - Builds Docker images on merge to main.
# Staging auto-deploys. Production requires manual approval via environment rules.
#
# Rollback: gh workflow run deploy.yml -f environment=staging -f rollback_tag=abc1234
#
# Required Secrets: DIGITALOCEAN_ACCESS_TOKEN, DIGITALOCEAN_CLUSTER_NAME,
#   DATABASE_URL (prod), STAGING_DATABASE_URL (staging)
# Required Vars: STAGING_HEALTH_URL, PRODUCTION_HEALTH_URL
# Required Environments: staging (auto), production (add "Required reviewers")

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - production
          - staging
      rollback_tag:
        description: 'Image tag to rollback to (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # ==================== BUILD BACKEND DOCKER IMAGE ====================
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    if: inputs.rollback_tag == ''
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD FRONTEND DOCKER IMAGE ====================
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    if: inputs.rollback_tag == ''
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY TO STAGING (auto) ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: >-
      always()
      && (needs.build-backend.result == 'success' || inputs.rollback_tag != '')
      && (inputs.environment == 'staging' || inputs.environment == '')
    environment:
      name: staging
      url: https://staging.solfoundry.org
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            echo "tag=${{ inputs.rollback_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/solfoundry-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace staging
          kubectl set image deployment/solfoundry-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace staging
          kubectl rollout status deployment/solfoundry-backend --namespace staging --timeout=300s
          kubectl rollout status deployment/solfoundry-frontend --namespace staging --timeout=300s

      - name: Verify Staging Health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf ${{ vars.STAGING_HEALTH_URL }} | grep -q ok; then
              echo "Staging healthy"; exit 0
            fi; sleep 10
          done
          echo "Health check failed"; exit 1

  # ==================== DEPLOY TO PRODUCTION ====================
  # Production environment MUST have "Required reviewers" protection rule.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-backend, build-frontend]
    if: >-
      always()
      && (needs.deploy-staging.result == 'success' || inputs.environment == 'production')
      && (inputs.environment == 'production' || inputs.environment == '')
    environment:
      name: production
      url: https://solfoundry.org
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            echo "tag=${{ inputs.rollback_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to Production
        run: |
          kubectl set image deployment/solfoundry-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace production
          kubectl set image deployment/solfoundry-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} \
            --namespace production
          kubectl rollout status deployment/solfoundry-backend --namespace production --timeout=300s
          kubectl rollout status deployment/solfoundry-frontend --namespace production --timeout=300s

      - name: Verify Production Health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf ${{ vars.PRODUCTION_HEALTH_URL }} | grep -q ok; then
              echo "Production healthy"; exit 0
            fi; sleep 10
          done
          echo "Health check failed"; exit 1

  # ==================== DATABASE MIGRATIONS ====================
  migrate-staging:
    name: Run Staging Migrations
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install and run migrations
        working-directory: backend
        run: pip install -r requirements.txt alembic && alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        continue-on-error: true

  migrate-production:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    needs: deploy-production
    if: needs.deploy-production.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install and run migrations
        working-directory: backend
        run: pip install -r requirements.txt alembic && alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

  # ==================== DEPLOYMENT SUMMARY ====================
  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, deploy-staging, deploy-production, migrate-staging, migrate-production]
    if: always()
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Deploy | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Deploy | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Migration | ${{ needs.migrate-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Migration | ${{ needs.migrate-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback" >> $GITHUB_STEP_SUMMARY
          echo "Trigger workflow_dispatch with rollback_tag to deploy a previous image." >> $GITHUB_STEP_SUMMARY