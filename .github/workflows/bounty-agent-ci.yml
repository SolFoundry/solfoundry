# =============================================================================
# CI/CD Pipeline for Bounty Agent — GitHub Actions
# Triggers: push to main, pull_request, manual dispatch
# Repository: SolFoundry/solfoundry | Bounty #861
# =============================================================================

name: Bounty Agent CI/CD

on:
  push:
    branches: [main, feat/autonomous-bounty-agent-861]
    paths:
      - 'bounty_agent/**'
      - 'main_bounty_agent.py'
      - 'Dockerfile.bounty-agent'
      - 'docker-compose.bounty-agent.yml'
      - 'bounty_agent/requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'bounty_agent/**'
      - 'main_bounty_agent.py'
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.12'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/bounty-agent

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bounty_agent/requirements.txt
          pip install ruff mypy bandit

      - name: Ruff lint
        run: ruff check bounty_agent/ main_bounty_agent.py --output-format=github

      - name: MyPy type check
        run: mypy bounty_agent/ --ignore-missing-imports --no-strict-optional

      - name: Bandit security scan
        run: bandit -r bounty_agent/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Job 2: Unit & Integration Tests ───────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bountyagent
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bountyagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bounty_agent/requirements.txt

      - name: Run unit tests
        env:
          GITHUB_TOKEN: test-token
          DATABASE_URL: postgresql+asyncpg://bountyagent:test@localhost:5432/bountyagent_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v \
            --cov=bounty_agent \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  # ── Job 3: Docker Build & Push ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.bounty-agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Job 4: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging-bounty-agent.solfoundry.org
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying bounty-agent to staging..."
          echo "Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # Add your deployment commands here (e.g., kubectl, docker compose, SSH)
          # docker compose -f docker-compose.bounty-agent.yml up -d

  # ── Job 5: Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event.inputs.deploy_environment == 'production'
    environment:
      name: production
      url: https://bounty-agent.solfoundry.org
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying bounty-agent to production..."
          echo "Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # Add your deployment commands here
          # docker compose -f docker-compose.bounty-agent.yml up -d
