# Devnet Deploy Pipeline - Runs on release tags (v*)
# Automatically deploys Anchor programs to Solana devnet when a release is tagged.

name: Devnet Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.0.0)'
        required: true

concurrency:
  group: devnet-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SOLANA_VERSION: '1.18.0'
  ANCHOR_VERSION: '0.30.0'
  RUST_VERSION: '1.76'
  NODE_VERSION: '20'

jobs:
  # ==================== VERIFY RELEASE ====================
  verify-release:
    name: Verify Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      has_anchor: ${{ steps.check.outputs.has_anchor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Check for Anchor project
        id: check
        run: |
          if [ -f "contracts/Anchor.toml" ]; then
            echo "has_anchor=true" >> $GITHUB_OUTPUT
          else
            echo "has_anchor=false" >> $GITHUB_OUTPUT
            echo "::notice::No Anchor.toml found — skipping program deploy"
          fi

  # ==================== BUILD PROGRAMS FOR RELEASE ====================
  build-programs:
    name: Build Programs (${{ needs.verify-release.outputs.tag }})
    runs-on: ubuntu-latest
    needs: verify-release
    if: needs.verify-release.outputs.has_anchor == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Cache Anchor Build
        uses: actions/cache@v4
        with:
          path: |
            contracts/target
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: anchor-devnet-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock') }}-${{ needs.verify-release.outputs.tag }}
          restore-keys: |
            anchor-devnet-${{ runner.os }}-

      - name: Build Anchor Program
        working-directory: contracts
        run: anchor build

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devnet-programs-${{ needs.verify-release.outputs.tag }}
          path: |
            contracts/target/deploy/
            contracts/target/idl/
          retention-days: 30

  # ==================== DEPLOY TO DEVNET ====================
  deploy-devnet:
    name: Deploy to Devnet (${{ needs.verify-release.outputs.tag }})
    runs-on: ubuntu-latest
    needs: [verify-release, build-programs]
    if: needs.verify-release.outputs.has_anchor == 'true'
    environment: devnet
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Configure Solana CLI for devnet
        run: solana config set --url devnet

      - name: Import deploy keypair
        run: |
          # Keypair is stored as a JSON array in the secret (never logs the key)
          echo '${{ secrets.DEVNET_DEPLOY_KEYPAIR }}' > ~/.config/solana/deploy.json
          chmod 600 ~/.config/solana/deploy.json
          solana config set --keypair ~/.config/solana/deploy.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: devnet-programs-${{ needs.verify-release.outputs.tag }}
          path: contracts/target/

      - name: Deploy programs to devnet
        working-directory: contracts
        run: |
          anchor deploy --provider.cluster devnet
        continue-on-error: true

      - name: Verify deployment
        working-directory: contracts
        run: |
          echo "Verifying deployed programs on devnet..."
          anchor idl fetch --provider.cluster devnet || true
          echo "Tag: ${{ needs.verify-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Network: devnet" >> $GITHUB_STEP_SUMMARY

      - name: Clean up keypair
        if: always()
        run: rm -f ~/.config/solana/deploy.json

  # ==================== DEVNET DEPLOY SUMMARY ====================
  devnet-status:
    name: Devnet Deploy Summary
    runs-on: ubuntu-latest
    needs: [verify-release, build-programs, deploy-devnet]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Devnet Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.verify-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Anchor project found:** ${{ needs.verify-release.outputs.has_anchor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Programs | ${{ needs.build-programs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to Devnet | ${{ needs.deploy-devnet.result }} |" >> $GITHUB_STEP_SUMMARY
