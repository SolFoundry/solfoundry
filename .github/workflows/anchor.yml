name: Anchor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: anchor-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: '1.18.26'
  ANCHOR_VERSION: '0.30.1'
  RUST_VERSION: '1.79'
  NODE_VERSION: '20'

jobs:
  anchor-build-test:
    name: Anchor Build & Test — bounty-registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Generate Solana keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Security audit — bounty-registry
        working-directory: contracts/bounty-registry
        run: cargo audit
        continue-on-error: true

      - name: Build Anchor Legacy (bounty-registry)
        working-directory: contracts/bounty-registry
        run: anchor build

      - name: Run Integration Tests — bounty-registry
        working-directory: contracts/bounty-registry
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899

  anchor-staking-audit:
    name: Anchor Build & Test — staking-program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Generate Solana keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Build Staking Program
        working-directory: contracts/staking-program
        run: anchor build

      - name: Run Integration Tests — staking-program
        working-directory: contracts/staking-program
        run: anchor test

  contracts-clippy:
    name: Rust Quality (clippy + fmt + audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Run Clippy — All Contracts
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run Fmt Check — All Contracts
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Security audit — bounty-registry
        working-directory: contracts/bounty-registry
        run: cargo audit
        continue-on-error: true

      - name: Security audit — staking-program
        working-directory: contracts/staking-program
        run: cargo audit
        continue-on-error: true

  anchor-summary:
    name: Anchor CI — Summary
    runs-on: ubuntu-latest
    needs: [anchor-build-test, anchor-staking-audit, contracts-clippy]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [[ "${{ needs.anchor-build-test.result }}" != "success" || "${{ needs.anchor-staking-audit.result }}" != "success" ]]; then
            echo "One or more Anchor jobs failed."
            exit 1
          fi
