# Solana Anchor Contract CI
# Builds and tests Anchor programs on Solana devnet

name: Anchor CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/anchor.yml'
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/anchor.yml'
  workflow_dispatch:

concurrency:
  group: anchor-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: '1.18.0'
  ANCHOR_VERSION: '0.30.0'
  RUST_VERSION: '1.76'

jobs:
  # ==================== CHECK FOR ANCHOR PROJECT ====================
  check-anchor:
    name: Check for Anchor Project
    runs-on: ubuntu-latest
    outputs:
      has_anchor: ${{ steps.check.outputs.has_anchor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Anchor.toml
        id: check
        run: |
          if [ -f "contracts/Anchor.toml" ]; then
            echo "has_anchor=true" >> $GITHUB_OUTPUT
            echo "Found Anchor.toml - proceeding with Anchor CI"
          else
            echo "has_anchor=false" >> $GITHUB_OUTPUT
            echo "::notice::No Anchor.toml found in contracts/ - skipping Anchor CI"
          fi

  # ==================== ANCHOR BUILD ====================
  anchor-build:
    name: Anchor Build
    runs-on: ubuntu-latest
    needs: check-anchor
    if: needs.check-anchor.outputs.has_anchor == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Configure Solana CLI
        run: |
          solana config set --url devnet
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json || true

      - name: Cache Anchor Build
        uses: actions/cache@v4
        with:
          path: |
            contracts/target
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: anchor-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/Anchor.toml') }}
          restore-keys: |
            anchor-${{ runner.os }}-

      - name: Build Anchor Program
        working-directory: contracts
        run: anchor build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build
          path: |
            contracts/target/deploy/
            contracts/target/idl/
          retention-days: 7

  # ==================== ANCHOR TEST ON DEVNET ====================
  anchor-test:
    name: Anchor Test (Devnet)
    runs-on: ubuntu-latest
    needs: [check-anchor, anchor-build]
    if: needs.check-anchor.outputs.has_anchor == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Configure Solana CLI
        run: |
          solana config set --url devnet
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json || true

      - name: Airdrop SOL for Testing
        run: |
          solana airdrop 2 || true
          solana balance

      - name: Cache Anchor Build
        uses: actions/cache@v4
        with:
          path: |
            contracts/target
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: anchor-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/Anchor.toml') }}
          restore-keys: |
            anchor-${{ runner.os }}-

      - name: Run Anchor Tests
        working-directory: contracts
        run: anchor test --provider.cluster devnet
        continue-on-error: true

  # ==================== RUST SECURITY AUDIT ====================
  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    needs: check-anchor
    if: needs.check-anchor.outputs.has_anchor == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Cargo Audit
        run: cargo install cargo-audit

      - name: Run Security Audit
        working-directory: contracts
        run: cargo audit
        continue-on-error: true

  # ==================== RUST CLIPPY ====================
  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    needs: check-anchor
    if: needs.check-anchor.outputs.has_anchor == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Run Clippy
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Check Formatting
        working-directory: contracts
        run: cargo fmt -- --check
        continue-on-error: true

  # ==================== ANCHOR SUMMARY ====================
  anchor-status:
    name: Anchor CI Summary
    runs-on: ubuntu-latest
    needs: [check-anchor, anchor-build, anchor-test, rust-security, rust-clippy]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Anchor CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Anchor Project | ${{ needs.check-anchor.outputs.has_anchor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.anchor-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (Devnet) | ${{ needs.anchor-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.rust-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Clippy | ${{ needs.rust-clippy.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: contains(needs.*.result, 'failure')
        run: echo "Some Anchor CI jobs failed - check the logs above for details"