# Docker Compose for SolFoundry local development
# API: http://localhost:8000  Swagger: http://localhost:8000/docs

services:
  db:
    image: postgres:16-alpine
    container_name: solfoundry-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: solfoundry
      POSTGRES_PASSWORD: solfoundry_dev
      POSTGRES_DB: solfoundry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solfoundry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solfoundry-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://solfoundry:solfoundry_dev@db:5432/solfoundry
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
