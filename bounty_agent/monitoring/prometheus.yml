# =============================================================================
# Prometheus Configuration for Bounty Agent Monitoring
# Scrape targets: bounty-agent (8080), postgres-exporter, redis-exporter
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'solfoundry-bounty-agent'
    environment: 'production'

scrape_configs:
  - job_name: 'bounty-agent'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['bounty-agent:8080']
        labels:
          service: 'bounty-agent'
          tier: 'core'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          tier: 'data'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'cache'

rule_files:
  - 'alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
