version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15.4-alpine
    container_name: treasury-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: treasury
      POSTGRES_PASSWORD: ${DB_PASSWORD:-treasury_secret_pwd_2026}
      POSTGRES_DB: solfoundry_treasury
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury -d solfoundry_treasury"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: treasury-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: treasury-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://treasury:${DB_PASSWORD:-treasury_secret_pwd_2026}@postgres:5432/solfoundry_treasury
      REDIS_URL: redis://redis:6379
      PORT: 3000
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      TREASURY_WALLET: ${TREASURY_WALLET}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dashboard
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: treasury-dashboard
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
      NODE_ENV: production
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
